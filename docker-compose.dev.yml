version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: es-slice-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: es_slice
    ports:
      - "3306:3306"
    volumes:
      - ./java-gateway/src/main/resources/db/migration/V1__init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  elasticsearch:
    image: elasticsearch:7.17.9
    container_name: es-slice-es
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

volumes:
  mysql_data:
  es_data:
